[env:esp32-s2]
platform    = espressif32
framework   = arduino
board       = esp32-s2-saola-1
lib_ignore  = ble
             wifi
             ESP RainMaker
             ESP Insights
             spiffs
             NetworkClientSecure
             Zigbee
             Matter
             OpenThread
             dsp
build_flags = -DBUILTIN_RGBLED_PIN=18
              -DNR_OF_LEDS=1

